ai_usage_summary: |
  Used Gemini to review codebase structure, debug format validation issues, and refine the heuristic multipliers. No candidate profile data was shared with external APIs.

methodology_summary: |
  Dual-Layer Composite Scoring Engine combining local dense retrieval embeddings
  (all-MiniLM-L6-v2, 100% offline CPU) with a 16-factor career intelligence multiplier
  covering ML experience depth, promotion trajectory, consulting-history penalty,
  notice period curve, location fit, platform engagement signals, education tier,
  GitHub activity, skill assessments, profile completeness, and endorsements.
  O(1) honeypot pruning (expert-skill duration anomaly + calendar date inconsistency).
  Metadata pre-filtering reduces 100K candidates to ~6,600 before transformer inference,
  completing end-to-end in ~121 seconds on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
